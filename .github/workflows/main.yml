name: ZJMF Server Monitor

on:
  schedule:
    # 北京时间每天 04:07，cron 使用 UTC 时间
    - cron: "7 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zjmf-server-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create secure configuration
        env:
          SERVERS_JSON: ${{ secrets.SERVERS_JSON }}
        run: |
          python -c "import os,pathlib; pathlib.Path('servers.json').write_text(os.environ['SERVERS_JSON'], encoding='utf-8')"

      - name: Monitor for 15 minutes
        shell: bash
        run: |
          set +e
          timeout --foreground --signal=INT 15m \
            python -u server_monitor.py --interval 60
          code=$?

          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            exit "$code"
          fi
