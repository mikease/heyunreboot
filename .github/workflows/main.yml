name: ZJMF Server Monitor

on:
  schedule:
    # 北京时间每天 04:07（UTC 前一天 20:07）
    - cron: "7 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zjmf-server-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install "requests>=2.31,<3"

      - name: Create secure configuration
        env:
          SERVERS_JSON: ${{ secrets.SERVERS_JSON }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          config = os.environ.get("SERVERS_JSON", "").strip()
          if not config:
              raise SystemExit(
                  "SERVERS_JSON Secret 未配置或内容为空"
              )

          Path("servers.json").write_text(
              config,
              encoding="utf-8"
          )
          print("servers.json 已安全生成")
          PY

      - name: Monitor for 15 minutes
        shell: bash
        run: |
          set +e

          timeout --foreground --signal=INT 15m \
            python server_monitor.py --interval 60

          code=$?

          if [ "$code" -ne 0 ] && [ "$code" -ne 124 ]; then
            echo "监控程序异常退出，状态码：$code"
            exit "$code"
          fi

          echo "本次监控任务完成"
